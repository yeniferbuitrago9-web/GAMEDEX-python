{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Crear Producto</title>
</head>

<body style="
    background-image: url('{% static "imagenes/fondo.avif" %}');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: Arial;
">

<div style="
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
">

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <table style="
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            color: white;
            width: 500px;
            box-shadow: 0px 0px 20px black;
        ">

            <tr>
                <th colspan="2" style="font-size: 28px; padding-bottom: 20px;">
                    Crear Producto
                </th>
            </tr>

            <tr>
                <td>Nombre del Producto:</td>
                <td><input type="text" name="nombre" required style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Precio:</td>
                <td><input type="number" step="0.01" name="precio" required style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Cantidad:</td>
                <td><input type="number" name="cantidad" required style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Días de Garantía:</td>
                <td><input type="number" name="dias_garantia" required style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Descripción:</td>
                <td>
                    <textarea name="descripcion" rows="4" required style="width: 100%;"></textarea>
                </td>
            </tr>

            <tr>
                <td>Imagen del Producto:</td>
                <td><input type="file" name="imagen" style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Fecha de Creación:</td>
                <td>Se genera automáticamente</td>
            </tr>

            <tr>
                <td>Fecha de Modificación:</td>
                <td>Se actualiza automáticamente</td>
            </tr>

            <tr>
                <td colspan="2" style="text-align: center; padding-top: 20px;">
                    <button type="submit" style="
                        padding: 10px 20px;
                        background-color: green;
                        color: white;
                        border: none;
                        border-radius: 5px;
                        cursor: pointer;
                    ">
                        Crear Producto
                    </button><br>   <br>
                    <a href="{% url 'dashboard_vendedor' %}" class="btn-cancelar">  
                    Cancelar
                    </a>
                </td>
            </tr>
        </table>
    </form>

</div>

</body>
</html>
