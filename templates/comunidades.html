<style>
body {
    background: radial-gradient(circle at top, #020617, #000);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
}

/* PARTICULAS CANVAS */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* CONTENIDO */
.container {
    padding: 30px;
    position: relative;
    z-index: 1;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

h2 {
    font-size: 28px;
    background: linear-gradient(90deg, #0ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BOTONES */
.btn {
    padding: 10px 18px;
    border-radius: 12px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

.btn-crear {
    background: linear-gradient(45deg, #00ffcc, #22c55e);
    color: black;
}

.btn-volver {
    background: linear-gradient(45deg, #3b82f6, #9333ea);
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px cyan;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    position: relative;
    height: 220px;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 15px;
    background-size: cover;
    background-position: center;
    backdrop-filter: blur(10px);
    transition: 0.4s;
    border: 1px solid rgba(0,255,255,0.2);
}

/* EFECTO NEON BORDE */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, cyan, purple, cyan);
    z-index: 0;
    opacity: 0;
    transition: 0.4s;
}

/* OVERLAY */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1;
}

/* CONTENIDO */
.card h3,
.card p,
.actions {
    position: relative;
    z-index: 2;
}

.card h3 {
    color: #00ffff;
    font-size: 20px;
}

.card p {
    font-size: 14px;
    color: #cbd5f5;
}

/* ACCIONES */
.actions a {
    margin-right: 10px;
    text-decoration: none;
    font-size: 13px;
    transition: 0.2s;
}

.entrar { color: #00ffcc; }
.editar { color: #facc15; }
.eliminar { color: #ff4d4d; }

.actions a:hover {
    text-shadow: 0 0 10px currentColor;
}

/* HOVER PRO */
.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 25px cyan;
}

.card:hover::before {
    opacity: 1;
}
</style>

<canvas id="particles"></canvas>

<div class="container">

    <div class="header">
        <h2>🎮 Comunidades</h2>

        <div>
            <a href="{% url 'crear_comunidad' %}" class="btn btn-crear">➕ Crear</a>

            {% if es_admin %}
                <a href="{% url 'dashboard_admin' %}" class="btn btn-volver">🔙 Inicio</a>
            {% else %}
                <a href="{% url 'dashboard_usuario' %}" class="btn btn-volver">🔙 Inicio</a>
            {% endif %}
        </div>
    </div>

    <div class="grid">
        {% for comunidad in comunidades %}
        <div class="card"
        style="background-image: url('{% if comunidad.imagen %}{{ comunidad.imagen.url }}{% else %}https://images.unsplash.com/photo-1542751371-adc38448a05e{% endif %}')">

            <h3>{{ comunidad.nombre }}</h3>
            <p>{{ comunidad.descripcion }}</p>

            <div class="actions">
                <a href="{% url 'ver_comunidad' comunidad.id %}" class="entrar">🎮 Entrar</a>

                {% if request.user == comunidad.creador or es_admin %}
                    <a href="{% url 'editar_comunidad' comunidad.id %}" class="editar">✏️</a>
                    <a href="{% url 'eliminar_comunidad' comunidad.id %}" class="eliminar">🗑</a>
                {% endif %}
            </div>

        </div>
        {% endfor %}
    </div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: (Math.random() - 0.5) * 1,
        dy: (Math.random() - 0.5) * 1,
        size: Math.random() * 2
    });
}

let mouse = { x: null, y: null };

window.addEventListener("mousemove", e => {
    mouse.x = e.x;
    mouse.y = e.y;
});

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        let dist = Math.hypot(mouse.x - p.x, mouse.y - p.y);

        if (dist < 120) {
            p.x += (mouse.x - p.x) * 0.02;
            p.y += (mouse.y - p.y) * 0.02;
        }

        p.x += p.dx;
        p.y += p.dy;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "cyan";
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>
