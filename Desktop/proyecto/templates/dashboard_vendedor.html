{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Panel Vendedor</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:#e2e8f0;
}

/* ===== NAVBAR ===== */
.navbar{
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(10px);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1e293b;
}

.navbar h2{
    color:#38bdf8;
    letter-spacing:2px;
}

.navbar a{
    color:#94a3b8;
    margin-left:15px;
    text-decoration:none;
    transition:0.3s;
}

.navbar a:hover{
    color:#38bdf8;
}

/* ===== CONTAINER ===== */
.container{
    padding:40px;
}

/* ===== CARDS ===== */
.dashboard-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.card{
    background: linear-gradient(145deg, #020617, #0f172a);
    border:1px solid #1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(56,189,248,0.3), transparent);
    opacity:0;
    transition:0.5s;
}

.card:hover::before{
    opacity:1;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 0 25px rgba(56,189,248,0.3);
}

.card h1{
    font-size:36px;
    color:#38bdf8;
}

/* ===== BOTONES ===== */
.btn{
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
    border:none;
}

.primary{ background:#6366f1; color:white; }
.success{ background:#22c55e; color:white; }
.warning{ background:#f59e0b; color:black; }

.btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}

/* ===== FILTROS ===== */
.filters{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.filters input{
    padding:10px;
    border-radius:8px;
    border:none;
    background:#020617;
    color:white;
}

/* ===== TABLA ===== */
.tabla-container{
    background:#020617;
    border-radius:12px;
    border:1px solid #1e293b;
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    padding:15px;
    text-align:left;
}

td{
    padding:15px;
    border-top:1px solid #1e293b;
}

tr:hover{
    background:#0f172a;
}

/* ===== BADGES ===== */
.badge{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

.publicado{ background:#22c55e; }
.borrador{ background:#64748b; }

/* ===== PAGINADOR ===== */
.pagination{
    margin-top:20px;
    text-align:center;
}

.pagination a{
    margin:5px;
}

/* ===== TOAST ===== */
#toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#0f172a;
    padding:12px 20px;
    border-radius:10px;
    border:1px solid #38bdf8;
    display:none;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🎮 GAMEDEX</h2>

    <div>
        {{ request.user.username }}
        <a href="{% url 'editar_perfil' %}">Perfil</a>
        <a href="{% url 'logout' %}">Salir</a>
    </div>
</div>

<div class="container">

<!-- CARDS -->
<div class="dashboard-cards">
    <div class="card"><h3>Total</h3><h1>{{ total_productos }}</h1></div>
    <div class="card"><h3>Publicados</h3><h1>{{ publicados }}</h1></div>
    <div class="card"><h3>Borradores</h3><h1>{{ borradores }}</h1></div>
    <div class="card"><h3>Activos</h3><h1>{{ activos }}</h1></div>
</div>

<!-- BOTONES -->
<div style="margin-bottom:20px;">
    <a href="{% url 'crear_producto' %}" class="btn primary">+ Crear</a>
    <a href="{% url 'exportar_pdf_vendedor' %}" class="btn warning">PDF</a>
    <a href="{% url 'exportar_excel_vendedor' %}" class="btn success">Excel</a>
</div>

<!-- FILTRO -->
<div class="filters">
    <input type="text" id="search" placeholder="Buscar producto...">
</div>

<!-- TABLA -->
<div class="tabla-container" id="tabla-container">
    {% include "partials/tabla_productos.html" %}
</div>

</div>

<div id="toast">Actualizado 🚀</div>

<script>

/* 🔍 BUSQUEDA AJAX */
const searchInput = document.getElementById("search");

function fetchProductos(page=1){
    const query = searchInput.value;

    fetch(`?q=${query}&page=${page}`, {
        headers: {"X-Requested-With": "XMLHttpRequest"}
    })
    .then(res => res.text())
    .then(html => {
        document.getElementById("tabla-container").innerHTML = html;
        showToast();
    });
}

searchInput.addEventListener("keyup", () => fetchProductos());

/* 📄 PAGINACION AJAX */
document.addEventListener("click", function(e){
    if(e.target.closest(".pagination a")){
        e.preventDefault();
        const url = new URL(e.target.href);
        const page = url.searchParams.get("page");
        fetchProductos(page);
    }
});

/* 🔔 TOAST */
function showToast(){
    const toast = document.getElementById("toast");
    toast.style.display = "block";
    setTimeout(()=> toast.style.display="none", 2000);
}

</script>

</body>
</html>
