<style>
body {
    background: #0f172a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.container {
    padding: 30px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.btn {
    padding: 10px 15px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-crear {
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: black;
}

.btn-volver {
    background: linear-gradient(45deg, #3b82f6, #60a5fa);
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* Tarjeta con fondo de imagen */
.card {
    position: relative;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,255,255,0.2);
    overflow: hidden;
    height: 200px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    transition: 0.3s;
    background-size: cover;
    background-position: center;
}

/* Overlay oscuro para mejorar legibilidad */
.card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 15px;
    z-index: 1;
}

.card h3,
.card p,
.card .actions {
    position: relative;
    z-index: 2;
    margin: 0;
}

.card h3 {
    color: #38bdf8;
    font-size: 20px;
    margin-bottom: 5px;
}

.card p {
    color: #cbd5f5;
    font-size: 14px;
    margin-bottom: 10px;
}

.actions a {
    margin-right: 10px;
    font-size: 14px;
    text-decoration: none;
}

.entrar { color: #22c55e; }
.editar { color: #facc15; }
.eliminar { color: #ef4444; }

.card:hover {
    transform: translateY(-5px);
}
</style>

<div class="container">

    <div class="header">
        <h2>🎮 Comunidades</h2>

        <div>
            <a href="{% url 'crear_comunidad' %}" class="btn btn-crear">➕ Crear</a>

            {% if es_admin %}
                <a href="{% url 'dashboard_admin' %}" class="btn btn-volver">🔙 Inicio</a>
            {% else %}
                <a href="{% url 'dashboard_usuario' %}" class="btn btn-volver">🔙 Inicio</a>
            {% endif %}
        </div>
    </div>

    <div class="grid">
        {% for comunidad in comunidades %}
        <div class="card" style="background-image: url('{% if comunidad.imagen %}{{ comunidad.imagen.url }}{% else %}https://images.unsplash.com/photo-1542751371-adc38448a05e{% endif %}')">
            <h3>{{ comunidad.nombre }}</h3>
            <p>{{ comunidad.descripcion }}</p>

            <div class="actions">
                <a href="{% url 'ver_comunidad' comunidad.id %}" class="entrar">🎮 Entrar</a>

                {% if request.user == comunidad.creador or es_admin %}
                    <a href="{% url 'editar_comunidad' comunidad.id %}" class="editar">✏️ Editar</a>
                    <a href="{% url 'eliminar_comunidad' comunidad.id %}" class="eliminar">🗑 Eliminar</a>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>

</div>
