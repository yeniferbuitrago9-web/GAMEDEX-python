<h1>Productos Publicados</h1>
<p>Vendedor: {{ usuario.username }}</p>

<table border="1" cellpadding="5">
<tr>
    <th>Nombre</th>
    <th>Precio</th>
    <th>Stock</th>
</tr>

{% for p in productos %}
<tr>
    <td>{{ p.nombre }}</td>
    <td>${{ p.precio }}</td>
    <td>{{ p.cantidad }}</td>
</tr>
{% endfor %}

</table>
