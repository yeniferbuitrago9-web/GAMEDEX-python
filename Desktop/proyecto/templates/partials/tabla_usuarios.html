<table>
    <thead>
        <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acción</th>
        </tr>
    </thead>

    <tbody>
    {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.username }}</td>
            <td>{{ usuario.email }}</td>

            <td>
                {% for grupo in usuario.groups.all %}
                    <span class="badge">{{ grupo.name }}</span>
                {% empty %}
                    <span class="badge">Sin rol</span>
                {% endfor %}
            </td>

            <td class="status">...</td>

            <td>
                <a href="{% url 'editar_usuario' usuario.id %}" class="btn warning">
                    Editar
                </a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="5">No hay usuarios</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
